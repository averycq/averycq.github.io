<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    
    <video autoplay muted loop playsinline id="bg-video">
      <source src="starloop.mp4" type="video/mp4">
    </video>
    
    <div class="container">
      <h1>Contact Me</h1>
      <form action="https://formspree.io/f/mlgoporn" method="POST">
        <label>Your email:</label>
        <input type="email" name="email">
        <label>Your message:</label>
        <textarea name="message"></textarea>
        <button type="submit" class="outline-btn">Send</button>
      </form>
      <p id="form-status" style="color: white; display: none;">Message sent!</p>
      <a href="index.html" class="home-link">..</a>
    </div>

    <script>
      const form = document.getElementById('contact-form');
      const status = document.getElementById('form-status');

      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const data = new FormData(form);
        const response = await fetch('https://formspree.io/f/mlgoporn', {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          form.style.display = 'none';
          status.style.display = 'block';
        } else {
          status.textContent = 'Something went wrong, please try again.';
          status.style.display = 'block';
        }
      });
    </script>
    
  </body>
</html>
